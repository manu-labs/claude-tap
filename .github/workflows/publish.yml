name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -x --timeout=60

  publish:
    needs: ci
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Verify version matches tag
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg_version=$(python3 -c "
          import re
          m = re.search(r'version = \"(.+?)\"', open('pyproject.toml').read())
          print(m.group(1))
          ")
          if [ "$tag" != "$pkg_version" ]; then
            echo "::error::Tag v$tag does not match pyproject.toml version $pkg_version"
            exit 1
          fi
          echo "Publishing version $pkg_version"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          prev_tag=$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || echo "")
          if [ -n "$prev_tag" ]; then
            notes="$(git log "${prev_tag}..${tag}" --pretty=format:'- %h %s')"
          else
            notes="$(git log --pretty=format:'- %h %s' -n 20)"
          fi
          gh release create "$tag" \
            --title "$tag" \
            --notes "$notes"
